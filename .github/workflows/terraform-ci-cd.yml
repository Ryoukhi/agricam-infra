name: Terraform CI/CD Pipeline (Dev only)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  TF_VERSION: 1.5.7
  AWS_REGION: eu-north-1              # ou eu-north-1 selon votre bootstrap
  TF_STATE_BUCKET: agricam-tfstate-1234567890
  TF_LOCK_TABLE: terraform-locks
  WORKING_DIR_DEV: environnements/dev

jobs:
  # Niveau 1 - Linting
  linting:
    name: Niveau 1 - Linting (fmt, tflint, tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: v0.48.0
      - name: Run TFLint
        run: tflint --chdir=${{ env.WORKING_DIR_DEV }}
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.WORKING_DIR_DEV }}
          soft_fail: true

  # Niveau 2 - Tests unitaires
  unit-tests:
    name: Niveau 2 - Tests unitaires (validate, plan)
    runs-on: ubuntu-latest
    needs: [linting]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Terraform Init (backend distant)
        run: |
          cd ${{ env.WORKING_DIR_DEV }}
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environnements/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Terraform Validate
        run: terraform -chdir=${{ env.WORKING_DIR_DEV }} validate
      - name: Terraform Plan (dry-run)
        run: terraform -chdir=${{ env.WORKING_DIR_DEV }} plan -var-file=terraform.tfvars -input=false -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

  # Niveau 3 - Tests d'intégration (apply réel)
  integration-tests:
    name: Niveau 3 - Tests d'intégration (apply sur dev)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # Pas besoin d'environnement GitHub si vous n'utilisez pas les approvals
    # environment: dev   # facultatif, vous pouvez commenter
    concurrency: ci-dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Terraform Init
        run: |
          cd ${{ env.WORKING_DIR_DEV }}
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environnements/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Terraform Apply (auto-approve sur dev)
        run: terraform -chdir=${{ env.WORKING_DIR_DEV }} apply -var-file=terraform.tfvars -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      - name: Post-deployment smoke test (optionnel)
        run: |
          echo "Ajoutez ici un test de validation (ex: curl sur l'IP publique)"

  # Niveau 4 - Conformité
  compliance:
    name: Niveau 4 - Conformité & Security Policies
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.WORKING_DIR_DEV }}
          framework: terraform
          soft_fail: false
      - name: Run Terrascan
        uses: tenable/terrascan-action@main
        with:
          iac_type: 'terraform'
          policy_type: 'aws'
          directory: ${{ env.WORKING_DIR_DEV }}