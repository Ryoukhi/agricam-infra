name: Terraform CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  TF_VERSION: 1.5.7
  AWS_REGION: eu-north-1
  TF_STATE_BUCKET: agricam-tfstate-1234567890
  TF_LOCK_TABLE: terraform-locks
  WORKING_DIR_DEV: environnements/dev
  WORKING_DIR_PROD: environnements/prod

jobs:
  # ---------- Niveau 1 - Linting ----------
  linting:
    name: Niveau 1 - Linting (fmt, tflint, tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: v0.48.0
      - name: Run TFLint
        run: tflint --chdir=${{ env.WORKING_DIR_DEV }}
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.WORKING_DIR_DEV }}
          soft_fail: true

  # ---------- Niveau 2 - Tests unitaires ----------
  unit-tests:
    name: Niveau 2 - Tests unitaires (validate, plan)
    runs-on: ubuntu-latest
    needs: [linting]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Terraform Init (backend distant)
        run: |
          cd ${{ env.WORKING_DIR_DEV }}
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environnements/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Terraform Validate
        run: terraform -chdir=${{ env.WORKING_DIR_DEV }} validate
      - name: Terraform Plan (dry-run)
        run: terraform -chdir=${{ env.WORKING_DIR_DEV }} plan -input=false -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_environnement: dev
          TF_VAR_ami_id: ami-0826f7fac3eaaa32a
          TF_VAR_ip_admin: 102.244.197.142/32
          TF_VAR_aws_region: eu-north-1
          TF_VAR_type_instance: t3.micro

  # ---------- Niveau 3 - Tests d'intégration (apply réel sur dev, auto-approve) ----------
  integration-tests:
    name: Niveau 3 - Tests d'intégration (apply sur dev)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    concurrency: ci-dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Terraform Init
        run: |
          cd ${{ env.WORKING_DIR_DEV }}
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environnements/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Terraform Apply (auto-approve sur dev)
        run: terraform -chdir=${{ env.WORKING_DIR_DEV }} apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_environnement: dev
          TF_VAR_ami_id: ami-0826f7fac3eaaa32a
          TF_VAR_ip_admin: 102.244.197.142/32
          TF_VAR_aws_region: eu-north-1
          TF_VAR_type_instance: t3.micro
        
  # ---------- Niveau 4 - Conformité ----------
  compliance:
    name: Niveau 4 - Conformité & Security Policies
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.WORKING_DIR_DEV }}
          framework: terraform
          soft_fail: true
      - name: Run Terrascan
        uses: tenable/terrascan-action@main
        with:
          iac_type: 'terraform'
          policy_type: 'aws'
          directory: ${{ env.WORKING_DIR_DEV }}
          only_warn: true

  # ---------- Déploiement production (avec approbation manuelle) ----------
  deploy-prod:
    name: Déployer en production (manuel)
    runs-on: ubuntu-latest
    needs: [compliance]
    if: github.event_name == 'workflow_dispatch'
    concurrency: ci-prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (prod)
        run: |
          cd ${{ env.WORKING_DIR_PROD }}
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environnements/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Plan (prod)
        id: plan
        run: |
          cd ${{ env.WORKING_DIR_PROD }}
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="environnement=prod" \
            -var="ami_id=${{ secrets.PROD_AMI_ID }}" \
            -var="ip_admin=${{ secrets.PROD_IP_ADMIN }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="type_instance=t3.micro"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload plan artifact (pour relecture)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR_PROD }}/tfplan

      - name: Terraform Apply (prod)
        run: |
          cd ${{ env.WORKING_DIR_PROD }}
          terraform apply -input=false tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}